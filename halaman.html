<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFARISY - Official Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(125, 211, 252, 0.3);
            border-radius: 40px;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-container { margin-bottom: 25px; display: flex; justify-content: center; }
.main-logo {
    width: 600px; /* Atur angka ini sesuka hati untuk memperbesar logo (contoh: 400px, 500px, atau 600px) */
    max-width: none; /* Kunci utamanya: HAPUS batasan maksimalnya! */
    height: auto;
    filter: drop-shadow(0 0 10px rgba(125, 211, 252, 0.3));
}

        .featured-img {
            width: 100%; height: 250px;
            background: url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1000') center/cover; 
            border-radius: 25px; margin-bottom: 35px; border: 1px solid rgba(125, 211, 252, 0.2);
        }

        h2 { font-size: 1.4rem; margin-bottom: 12px; color: #7dd3fc; letter-spacing: 1px; }
        .description { font-size: 0.9rem; margin-bottom: 35px; color: #cbd5e1; font-weight: 300; }

        .btn-link, .btn-action {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 16px; margin-bottom: 15px;
            border: 1.5px solid #ffffff; border-radius: 50px;
            background: transparent; color: #ffffff;
            text-decoration: none; font-weight: 600; font-size: 0.85rem;
            letter-spacing: 1.5px; transition: all 0.4s ease; text-transform: uppercase;
            cursor: pointer;
        }

        .btn-link:hover, .btn-action:hover {
            background: #7dd3fc; border-color: #7dd3fc; color: #000000;
            transform: translateY(-3px); box-shadow: 0 10px 20px rgba(125, 211, 252, 0.2);
        }

        .btn-primary {
            display: block; width: 100%; padding: 16px; margin-top: 25px;
            background: #7dd3fc; color: #000000; border: none; border-radius: 12px;
            font-weight: 700; text-decoration: none; text-transform: uppercase;
            letter-spacing: 1.5px; transition: 0.3s; box-shadow: 0 5px 15px rgba(125, 211, 252, 0.2);
        }

        .btn-primary:hover { background: #ffffff; transform: scale(1.02); }

        #pdf-container {
            display: none; margin-bottom: 20px; width: 100%; height: 400px;
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(125, 211, 252, 0.3);
            background: #ffffff;
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        .footer { margin-top: 40px; font-size: 0.85rem; color: #94a3b8; letter-spacing: 1px; line-height: 1.6; }
        .footer span { color: #7dd3fc; font-weight: 600; font-size: 0.9rem; }
        .footer-copyright { font-size: 0.7rem; margin-top: 8px; color: #64748b; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="logo-container">
        <img src="logo.png" alt="ALFARISY PHOTO WORKS" class="main-logo">
    </div>

    <div class="featured-img"></div>

    <h2>Layanan & Harga</h2>
    <p class="description">Abadikan momen terbaik Anda bersama kami.</p>

    <button class="btn-action" onclick="togglePDF()" id="btn-pdf">LIHAT PRICE LIST (PDF)</button>

    <div id="pdf-container">
        <iframe src="harga.pdf"></iframe>
    </div>

    <a href="#" class="btn-link">INSTAGRAM</a>
    <a href="#" class="btn-link">TIKTOK</a>

    <a href="booking.html" class="btn-primary">BOOKING SEKARANG</a>

    <div class="footer">
        <p>Admin WA: <span>0812-3456-7890</span></p> <p class="footer-copyright">© 2026 ALFARISY. All Rights Reserved.</p>
    </div>
</div>

<script>
    function togglePDF() {
        var pdfBox = document.getElementById("pdf-container");
        var btnPdf = document.getElementById("btn-pdf");

        if (pdfBox.style.display === "none" || pdfBox.style.display === "") {
            pdfBox.style.display = "block";
            btnPdf.innerHTML = "TUTUP PRICE LIST";
        } else {
            pdfBox.style.display = "none";
            btnPdf.innerHTML = "LIHAT PRICE LIST (PDF)";
        }
    }
</script>

</body>
</html>
